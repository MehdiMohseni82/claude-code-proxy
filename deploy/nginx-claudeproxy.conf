# Nginx site config for claudeproxy.halocline.cloud
# Install at /etc/nginx/sites-enabled/claudeproxy
# Modeled on the existing jarvis site config on the same host.
server {
    server_name claudeproxy.halocline.cloud;
    client_max_body_size 10M;

    # Increase buffer sizes for Next.js RSC headers
    large_client_header_buffers 4 32k;

    # Admin UI (Next.js) — pages live under /admin/* in app/admin/
    location /admin {
        proxy_pass http://127.0.0.1:9027;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js RSC needs larger buffers
        proxy_buffer_size 32k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # Next.js static assets and HMR
    location /_next/ {
        proxy_pass http://127.0.0.1:9027;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NextAuth.js routes (mounted at /api/auth by default)
    location /api/auth/ {
        proxy_pass http://127.0.0.1:9027;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js proxy routes (dashboard client -> Express admin API)
    location /api/proxy/ {
        proxy_pass http://127.0.0.1:9027;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAI-compatible API endpoints (Express) — must support SSE streaming
    location /v1/ {
        proxy_pass http://127.0.0.1:9026;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
    }

    # Express admin REST API (called by Next.js server-side)
    location /api/admin/ {
        proxy_pass http://127.0.0.1:9026;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:9026;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default: redirect bare host to /admin
    location = / {
        return 302 /admin;
    }

    listen 80;
}
